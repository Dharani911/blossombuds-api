spring.config.import=classpath:.env.local.properties

# --- DataSource (local Docker Postgres on 127.0.0.1:5544) ---
spring.datasource.url=jdbc:postgresql://127.0.0.1:5544/bb
spring.datasource.username=app_user
spring.datasource.password=app_password

# --- JPA ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Remove Open-Session-In-View warning
spring.jpa.open-in-view=false

# Optional: tame Hikari logs by being explicit
spring.datasource.hikari.maximum-pool-size=25
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info,mappings
#management.health.mail.enabled=false

# Expose exception messages in error responses (needed for client-side validation feedback)
server.error.include-message=always


# --- Liquibase (ON) ---
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/liquibase/changelog-master.xml
spring.liquibase.default-schema=bb_app
# local only, one run
spring.liquibase.clear-checksums=true
spring.jpa.properties.hibernate.default_schema=bb_app
spring.datasource.hikari.schema=bb_app

# CORS for local dev frontends
spring.mvc.cors.mappings.[/**].allowed-origins=http://localhost:5173,http://localhost:3000
spring.mvc.cors.mappings.[/**].allowed-origin-patterns=http://*.local:5173,http://*.lan:5173,http://10.*.*.*:5173,http://172.16.*.*:5173,http://172.17.*.*:5173,http://172.18.*.*:5173,http://172.19.*.*:5173,http://172.20.*.*:5173,http://172.21.*.*:5173,http://172.22.*.*:5173,http://172.23.*.*:5173,http://172.24.*.*:5173,http://172.25.*.*:5173,http://172.26.*.*:5173,http://172.27.*.*:5173,http://172.28.*.*:5173,http://172.29.*.*:5173,http://172.30.*.*:5173,http://172.31.*.*:5173,http://192.168.*.*:5173
spring.mvc.cors.mappings.[/**].allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.mvc.cors.mappings.[/**].allowed-headers=*
spring.mvc.cors.mappings.[/**].allow-credentials=true
spring.mvc.cors.mappings.[/**].max-age=3600

server.address=0.0.0.0

app.jwt.secret=${APP_JWT_SECRET}
app.jwt.ttl-seconds=7200
app.jwt.customer-ttl-seconds=157680000


# Mail (for now you can point to a dummy/local SMTP; we?ll swap later)
spring.mail.host=smtp.zoho.eu
spring.mail.port=587
spring.mail.username=no-reply@blossom-buds-floral-artistry.com
spring.mail.password=${MAIL_SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.debug=true
app.mail.from=no-reply@blossom-buds-floral-artistry.com

#http mail
# From address (keep whatever you used before with Zoho)


# HTTP email provider (example: Resend)
app.mail.apiUrl=https://api.resend.com/emails
app.mail.apiKey=${MAIL_API_KEY:}

# Optional: URL of your logo image (S3, CloudFront, etc.)
app.mail.logoUrl=http://localhost:8080/BB_logo.png

# Frontend base URL used in verification links
app.frontend.baseUrl=http://localhost:5173

#CloudFlare R2
cloudflare.r2.access-key=${R2_ACCESS_KEY:}
cloudflare.r2.secret-key=${R2_SECRET_KEY:}
cloudflare.r2.bucket=product-images
cloudflare.r2.region=auto
cloudflare.r2.endpoint=https://44df320f0940989c39a311ab3ce6dac1.r2.cloudflarestorage.com

app.imagemagick.cmd=C:\\Program Files\\ImageMagick-7.1.2-Q16-HDRI\\magick.exe

# let Spring accept up to ~10 MB files
# multipart limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# Tomcat: remove swallowing/post size limits
server.tomcat.max-swallow-size=-1
server.tomcat.max-http-form-post-size=-1

# timeouts (helpful if ImageMagick takes a moment)
server.connection-timeout=120s
spring.mvc.async.request-timeout=120s

# Multipart + servlet noise
logging.level.org.springframework.web.multipart=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestResponseBodyMethodProcessor=INFO
logging.level.org.springframework.http.converter=DEBUG

# Your app
logging.level.com.blossombuds.web=INFO
logging.level.com.blossombuds.service=INFO



# Razorpay

app.razorpay.webhook-secret-test=${RAZORPAY_WEBHOOK_SECRET:}
app.razorpay.base-url=https://api.razorpay.com/v1
app.razorpay.key-id=${RAZORPAY_KEY_ID:}
app.razorpay.key-secret=${RAZORPAY_KEY_SECRET:}

spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

reviews.images.alwaysNormalize=false

# (optional) extra visibility while first run
# logging.level.org.springframework.boot.autoconfigure.liquibase=DEBUG
# logging.level.liquibase=DEBUG
logging.level.root=INFO

# === Google OAuth2 login ===

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}

# Scopes: basic sign-in via OIDC
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Default redirect URI pattern Spring expects:
# {baseUrl} is your backend base URL (e.g. https://api.blossombuds.in)
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:5173/login/oauth2/code/google

# Optional display name
spring.security.oauth2.client.registration.google.client-name=Google



# --- Redis Configuration ---
# IMPORTANT: bump app.cache.key-version whenever a cached DTO (CategoryDto, ProductDto, etc.) changes structure.
# This invalidates all stale Redis entries on the next deploy and prevents Jackson deserialization errors.
app.cache.key-version=v31
spring.cache.type=redis
spring.data.redis.host=${REDISHOST:localhost}
spring.data.redis.port=${REDISPORT:6379}
spring.data.redis.password=${REDISPASSWORD:}
spring.data.redis.username=${REDISUSER:default}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}
spring.data.redis.timeout=3000
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=2000ms

